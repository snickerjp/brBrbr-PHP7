name: PHP Lint

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['5.3', '5.6', '7.0', '7.4', '8.0', '8.3']
    name: PHP ${{ matrix.php }}
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
      - run: php -l brBrbr-PHP7.php
